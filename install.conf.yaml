

- link:
    ~/.profile: profile
    ~/.bash_profile: bash_profile
    ~/.bashrc: bashrc
    ~/.bash_logout: bash_logout
    ~/.gitconfig: gitconfig
    ~/.gitshrc: gitshrc
    ~/.ssh/config:
        path: ssh/config
        create: true
    ~/.config/nvim:
        path: nvim
        relink: true
        force: true
        create: true
    ~/.local/share/nvim/site:
        path: vim
        relink: true
        create: true
    ~/.tmux.conf: tmux.conf
    ~/.tmux: tmux
    ~/.zprofile: zprofile
    ~/.p10k.zsh: p10k.zsh
    ~/.zshrc: zshrc
    ~/.zsh_plugins.txt: zsh_plugins.txt
    ~/.vim: vim
    ~/.antidote: antidote
    ~/.local/bin/op-ssh-sign:
        path: local/bin/op-ssh-sign
        create: true
    ~/.vimrc:
      relink: true
      path: vimrc

- shell:
  - [git submodule update --init --recursive, Installing submodules]
