

- link:
    ~/.profile: profile
    ~/.bash_profile: bash_profile
    ~/.bashrc: bashrc
    ~/.bash_logout: bash_logout
    ~/.gitconfig: gitconfig
    ~/.gitshrc: gitshrc
    ~/.ssh/config:
        path: ssh/config
        create: true
    ~/.config/nvim:
        path: nvim
        relink: true
        force: true
        create: true
    ~/.tmux.conf: tmux.conf
    ~/.tmux: tmux
    ~/.zshenv: zshenv
    ~/.zprofile: zprofile
    ~/.p10k.zsh: p10k.zsh
    ~/.zshrc: zshrc
    ~/.zsh_plugins.txt: zsh_plugins.txt
    ~/.vim: nvim
    ~/.antidote: antidote
    ~/.local/bin/op-ssh-sign: local/bin/op-ssh-sign
    ~/.local/bin/install-ai-tools: local/bin/install-ai-tools
    ~/.local/bin/ssh-agent-sock.sh: local/bin/ssh-agent-sock.sh
    ~/.local/bin/ssh-carrier: local/bin/ssh-carrier

- shell:
  - [git submodule update --init --recursive, Installing submodules]
  - [nvim --headless "+Lazy! sync" +qa, Installing nvim plugins]
  - command: |
      if [ "$(uname)" = "Darwin" ]; then
        mkdir -p ~/Library/LaunchAgents
        for f in "$PWD"/macos/LaunchAgents/*.plist; do
          ln -sfn "$f" ~/Library/LaunchAgents/"$(basename "$f")"
        done
      fi
    description: Link macOS LaunchAgents
